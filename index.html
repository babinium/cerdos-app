<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐷 Cerdos App</title>
  <script src="https://unpkg.com/@solana/web3.js@1.91.7/lib/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D0D0D;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* ── Fondo grid neón ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,45,149,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,45,149,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      max-width: 440px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* ── Card principal (wallet) ── */
    .card {
      background: linear-gradient(145deg, #1A1A2E 0%, #16162A 100%);
      border-radius: 24px;
      padding: 40px 32px 24px;
      border: 1px solid rgba(255,45,149,0.15);
      box-shadow: 0 0 40px rgba(255,45,149,0.08), 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-img {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      object-fit: cover;
      margin-bottom: 8px;
      border: 2px solid rgba(255,45,149,0.3);
      box-shadow: 0 0 30px rgba(255,45,149,0.2);
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      color: #FF2D95;
      text-shadow: 0 0 20px rgba(255,45,149,0.4);
      margin-bottom: 2px;
    }

    .subtitle {
      color: #8888AA;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .btn-connect {
      background: linear-gradient(135deg, #FF2D95 0%, #BF5FFF 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      box-shadow: 0 0 30px rgba(255,45,149,0.3);
    }

    .btn-connect:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(255,45,149,0.5); }
    .btn-connect:active { transform: translateY(0); }
    .btn-connect:disabled { background: #333; cursor: not-allowed; box-shadow: none; }

    /* ── Resultados wallet ── */
    .result {
      margin-top: 20px;
      padding: 20px 16px;
      border-radius: 16px;
      display: none;
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result.success {
      background: rgba(57,255,20,0.06);
      border: 1px solid rgba(57,255,20,0.3);
      box-shadow: 0 0 30px rgba(57,255,20,0.1);
    }
    .result.fail {
      background: rgba(255,45,149,0.06);
      border: 1px solid rgba(255,45,149,0.25);
      box-shadow: 0 0 30px rgba(255,45,149,0.08);
    }
    .result.visible { display: block; }
    .result-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .success .result-title { color: #39FF14; text-shadow: 0 0 15px rgba(57,255,20,0.4); }
    .fail .result-title { color: #FF2D95; text-shadow: 0 0 15px rgba(255,45,149,0.3); }
    .wallet-info {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 10px;
      margin-top: 10px;
      font-size: 12px;
      color: #999;
      word-break: break-all;
    }
    .wallet-info strong { display: block; color: #BF5FFF; margin-bottom: 4px; }
    .balance { font-size: 32px; font-weight: 900; color: #39FF14; text-shadow: 0 0 25px rgba(57,255,20,0.5); margin: 6px 0; }
    .balance-label { color: #39FF14; font-weight: 600; font-size: 13px; opacity: 0.8; text-transform: uppercase; letter-spacing: 2px; }
    .btn-disconnect {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: #888;
      padding: 8px 20px;
      border-radius: 12px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 14px;
      transition: all 0.2s;
    }
    .btn-disconnect:hover { border-color: #FF2D95; color: #FF2D95; box-shadow: 0 0 15px rgba(255,45,149,0.15); }
    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════════
       🎰 TRAGAMONEDAS
       ═══════════════════════════════════════════ */

    .slot-card {
      background: linear-gradient(145deg, #1A1A2E 0%, #16162A 100%);
      border-radius: 24px;
      padding: 28px 24px 24px;
      border: 1px solid rgba(57,255,20,0.12);
      box-shadow: 0 0 50px rgba(57,255,20,0.06), 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
      margin-bottom: 24px;
    }

    .slot-title {
      font-size: 20px;
      font-weight: 800;
      color: #39FF14;
      text-shadow: 0 0 20px rgba(57,255,20,0.3);
      margin-bottom: 6px;
    }

    .slot-subtitle {
      color: #666;
      font-size: 12px;
      margin-bottom: 20px;
    }

    /* ── 3 Reels ── */
    .reels {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .reel-box {
      width: 100px;
      height: 100px;
      background: linear-gradient(145deg, #111122 0%, #0A0A18 100%);
      border-radius: 16px;
      border: 2px solid rgba(57,255,20,0.15);
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 20px rgba(57,255,20,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reel-box img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      transition: transform 0.05s linear;
    }

    .reel-box.spinning img {
      animation: reelFlicker 0.08s infinite;
    }

    @keyframes reelFlicker {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.92); }
    }

    .reel-box.win {
      border-color: #39FF14 !important;
      box-shadow: 0 0 30px rgba(57,255,20,0.4), inset 0 0 20px rgba(57,255,20,0.1) !important;
      animation: winPulse 0.4s ease-in-out 3;
    }

    @keyframes winPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* ── Botón girar ── */
    .btn-spin {
      background: linear-gradient(135deg, #39FF14 0%, #00CC66 100%);
      color: #0D0D0D;
      border: none;
      padding: 16px 48px;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 40px rgba(57,255,20,0.3);
      text-transform: uppercase;
      letter-spacing: 3px;
      width: 100%;
    }

    .btn-spin:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 60px rgba(57,255,20,0.5);
    }

    .btn-spin:active { transform: translateY(0); }

    .btn-spin:disabled {
      background: #222;
      color: #555;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* ── Resultado ── */
    .slot-result {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .slot-result.win-show {
      background: rgba(57,255,20,0.08);
      border: 1px solid rgba(57,255,20,0.3);
      color: #39FF14;
      text-shadow: 0 0 10px rgba(57,255,20,0.3);
      animation: slideUp 0.4s ease;
    }

    .slot-result.lose-show {
      background: rgba(255,45,149,0.06);
      border: 1px solid rgba(255,45,149,0.15);
      color: #FF2D95;
      animation: slideUp 0.4s ease;
    }

    .slot-result .multiplier {
      font-size: 28px;
      font-weight: 900;
      display: block;
      margin-top: 2px;
    }

    /* ── Paytable ── */
    .paytable {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .pay-item {
      text-align: center;
      font-size: 12px;
      color: #888;
    }

    .pay-item img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      margin-bottom: 4px;
      display: block;
    }

    .pay-item .pay-value {
      color: #39FF14;
      font-weight: 700;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ═══════════ Wallet Card ═══════════ -->
    <div class="card">
      <img class="logo-img" src="logo-cerdos.jpg" alt="Cerdos Logo">
      <h1>Cerdos App</h1>
      <p class="subtitle">¿Eres un cerdo especulador?</p>

      <button id="btnConnect" class="btn-connect" onclick="connectWallet()">
        Conectar Wallet
      </button>

      <div id="resultSuccess" class="result success">
        <div class="result-title">✨ ¡Eres un cerdo especulador!</div>
        <div class="balance" id="balanceDisplay">0</div>
        <div class="balance-label">CERDOS</div>
        <div class="wallet-info">
          <strong>🔑 Wallet</strong>
          <span id="walletDisplay">—</span>
        </div>
        <button class="btn-disconnect" onclick="disconnectWallet()">Desconectar</button>
      </div>

      <div id="resultFail" class="result fail">
        <div class="result-title">🐽 Todavía no eres un cerdo especulador</div>
        <p style="color:#888;font-size:14px;margin-bottom:12px;">No tenés tokens CERDOS en esta wallet.</p>
        <div class="wallet-info">
          <strong>🔑 Wallet</strong>
          <span id="walletDisplayFail">—</span>
        </div>
        <button class="btn-disconnect" onclick="disconnectWallet()">Desconectar</button>
      </div>
    </div>

    <!-- ═══════════ TRAGAMONEDAS ═══════════ -->
    <div class="slot-card">
      <div class="slot-subtitle">1 CERDO por giro · ¡3 iguales y ganás!</div>

      <!-- 3 Reels -->
      <div class="reels">
        <div class="reel-box" id="reel0"><img id="img0" src="mojarra_x1.jpg" alt="Slot 1"></div>
        <div class="reel-box" id="reel1"><img id="img1" src="mojarra_x1.jpg" alt="Slot 2"></div>
        <div class="reel-box" id="reel2"><img id="img2" src="mojarra_x1.jpg" alt="Slot 3"></div>
      </div>

      <!-- Botón girar -->
      <button class="btn-spin" id="btnSpin" onclick="spin()">🎰 GIRAR</button>

      <!-- Resultado -->
      <div class="slot-result" id="slotResult"></div>

      <!-- Tabla de premios -->
      <div class="paytable">
        <div class="pay-item"><img src="mojarra_x1.jpg" alt="Mojarra"><span class="pay-value">x1</span>Mojarra</div>
        <div class="pay-item"><img src="tiburon_x10.jpg" alt="Tiburón"><span class="pay-value">x5</span>Tiburón</div>
        <div class="pay-item"><img src="ballena_x30.jpg" alt="Ballena"><span class="pay-value">x15</span>Ballena</div>
        <div class="pay-item"><img src="cerdo_x100.jpg" alt="Cerdo"><span class="pay-value">x40</span>Cerdo</div>
      </div>
    </div>
  </div>

  <!-- ── Audio elements ── -->
  <audio id="soundSpin" src="giro.mp3" preload="auto"></audio>
  <audio id="soundWin" src="pago.mp3" preload="auto"></audio>

  <script>
    // ═══════════════════════════════════════
    // WALLET LOGIC (unchanged)
    // ═══════════════════════════════════════
    const CERDOS_MINT = 'CqJ5xawaraBqH5VPSQaCk7Dfei3aju3ry2UxfWkoGdKm';
    const RPC_URL = 'https://mainnet.helius-rpc.com/?api-key=ef809e99-6099-412a-b731-3ce2cba78008';
    let connection = null;
    let walletPublicKey = null;
    let currentProvider = null;

    const btnConnect = document.getElementById('btnConnect');
    const resultSuccess = document.getElementById('resultSuccess');
    const resultFail = document.getElementById('resultFail');

    function getProvider() {
      if (typeof window !== 'undefined') {
        if (window.phantom?.solana?.isPhantom) return window.phantom.solana;
        if (window.solflare?.isSolflare) return window.solflare;
        if (window.solana?.isPhantom || window.solana?.isSolflare) return window.solana;
      }
      return null;
    }

    async function connectWallet() {
      const provider = getProvider();
      if (!provider) {
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) {
          const currentUrl = encodeURIComponent(window.location.href);
          window.location.href = `https://phantom.app/ul/browse/${currentUrl}?ref=${currentUrl}`;
          return;
        }
        alert('No se detectó Phantom ni Solflare.\n\nDesktop: instalá Phantom desde phantom.app\nMobile: abrí esta página desde el navegador de Phantom.');
        return;
      }
      try {
        btnConnect.disabled = true;
        btnConnect.innerHTML = '<span class="loading"></span>Conectando...';
        const resp = await provider.connect();
        walletPublicKey = resp.publicKey.toString();
        currentProvider = provider;
        await verifyBalance();
      } catch (err) {
        console.error('Error conectando:', err);
        btnConnect.disabled = false;
        btnConnect.innerHTML = 'Conectar Wallet';
        if (err.code === 4001) return;
        alert('Error al conectar: ' + err.message);
      }
    }

    async function verifyBalance() {
      try {
        btnConnect.innerHTML = '<span class="loading"></span>Verificando cerdos...';
        const mintPubkey = new solanaWeb3.PublicKey(CERDOS_MINT);
        const ownerPubkey = new solanaWeb3.PublicKey(walletPublicKey);
        const conn = new solanaWeb3.Connection(RPC_URL, 'confirmed');
        const tokenAccounts = await conn.getParsedTokenAccountsByOwner(ownerPubkey, { mint: mintPubkey });
        connection = conn;
        let balance = 0;
        for (const acc of tokenAccounts.value) {
          balance += acc.account.data.parsed.info.tokenAmount.uiAmount || 0;
        }
        btnConnect.style.display = 'none';
        if (balance > 0) {
          resultSuccess.classList.add('visible');
          resultFail.classList.remove('visible');
          document.getElementById('balanceDisplay').textContent =
            balance % 1 === 0 ? balance.toLocaleString() : balance.toFixed(2);
          document.getElementById('walletDisplay').textContent = walletPublicKey;
        } else {
          resultSuccess.classList.remove('visible');
          resultFail.classList.add('visible');
          document.getElementById('walletDisplayFail').textContent = walletPublicKey;
        }
      } catch (err) {
        console.error('Error verificando balance:', err);
        btnConnect.style.display = 'none';
        resultSuccess.classList.remove('visible');
        resultFail.classList.add('visible');
        document.getElementById('walletDisplayFail').textContent = walletPublicKey;
        const failTitle = resultFail.querySelector('.result-title');
        const failMsg = resultFail.querySelector('p');
        failTitle.textContent = '⚠️ Error de conexión';
        failMsg.textContent = 'No se pudo verificar el balance. Reintentá.';
        let retryBtn = document.getElementById('retryBtn');
        if (!retryBtn) {
          retryBtn = document.createElement('button');
          retryBtn.id = 'retryBtn';
          retryBtn.className = 'btn-connect';
          retryBtn.textContent = 'Reintentar verificación';
          retryBtn.style.cssText = 'margin-top:12px;padding:12px 24px;font-size:14px;';
          retryBtn.onclick = verifyBalance;
          resultFail.appendChild(retryBtn);
        }
        retryBtn.style.display = 'block';
      }
    }

    async function disconnectWallet() {
      if (currentProvider) {
        try { await currentProvider.disconnect(); } catch(e) {}
        currentProvider = null;
      }
      walletPublicKey = null;
      connection = null;
      resetUI();
    }

    function resetUI() {
      btnConnect.style.display = 'block';
      btnConnect.disabled = false;
      btnConnect.innerHTML = 'Conectar Wallet';
      resultSuccess.classList.remove('visible');
      resultFail.classList.remove('visible');
      const failTitle = resultFail.querySelector('.result-title');
      const failMsg = resultFail.querySelector('p');
      if (failTitle) failTitle.textContent = '🐽 Todavía no eres un cerdo especulador';
      if (failMsg) failMsg.textContent = 'No tenés tokens CERDOS en esta wallet.';
      const retryBtn = document.getElementById('retryBtn');
      if (retryBtn) retryBtn.style.display = 'none';
    }

    window.addEventListener('load', () => {
      const provider = getProvider();
      if (provider) {
        provider.on('accountChanged', () => {
          if (walletPublicKey) disconnectWallet();
        });
      }
    });

    // ═══════════════════════════════════════
    // 🎰 TRAGAMONEDAS
    // ═══════════════════════════════════════
    const ICONS = [
      { name: 'Mojarra', file: 'mojarra_x1.jpg', multiplier: 1 },
      { name: 'Tiburón', file: 'tiburon_x10.jpg', multiplier: 5 },
      { name: 'Ballena', file: 'ballena_x30.jpg', multiplier: 15 },
      { name: 'Cerdo',   file: 'cerdo_x100.jpg', multiplier: 40 }
    ];

    const reelImgs = [
      document.getElementById('img0'),
      document.getElementById('img1'),
      document.getElementById('img2')
    ];
    const reelBoxes = [
      document.getElementById('reel0'),
      document.getElementById('reel1'),
      document.getElementById('reel2')
    ];
    const btnSpin = document.getElementById('btnSpin');
    const slotResult = document.getElementById('slotResult');
    const soundSpin = document.getElementById('soundSpin');
    const soundWin = document.getElementById('soundWin');

    let spinning = false;
    let currentIcons = [0, 0, 0]; // indices into ICONS

    function randomIcon() {
      return Math.floor(Math.random() * ICONS.length);
    }

    function setReelImage(reelIdx, iconIdx) {
      reelImgs[reelIdx].src = ICONS[iconIdx].file;
    }

    function spin() {
      if (spinning) return;
      spinning = true;

      // Reset UI
      slotResult.className = 'slot-result';
      slotResult.innerHTML = '';
      reelBoxes.forEach(b => b.classList.remove('win'));
      btnSpin.disabled = true;
      btnSpin.textContent = '🎰 GIRANDO...';

      // Play spin sound
      soundSpin.currentTime = 0;
      soundSpin.play().catch(() => {});

      // Final results (random)
      const finalIcons = [randomIcon(), randomIcon(), randomIcon()];

      // Start all 3 reels spinning
      const intervals = [];
      for (let i = 0; i < 3; i++) {
        intervals[i] = setInterval(() => {
          setReelImage(i, randomIcon());
        }, 60);
        reelBoxes[i].classList.add('spinning');
      }

      // Stop reels one by one with delays
      const stopDelays = [600, 1000, 1400]; // ms

      stopDelays.forEach((delay, reelIdx) => {
        setTimeout(() => {
          clearInterval(intervals[reelIdx]);
          reelBoxes[reelIdx].classList.remove('spinning');
          currentIcons[reelIdx] = finalIcons[reelIdx];
          setReelImage(reelIdx, finalIcons[reelIdx]);

          // Check if all 3 have stopped (last reel)
          if (reelIdx === 2) {
            setTimeout(() => checkWin(finalIcons), 200);
          }
        }, delay);
      });
    }

    function checkWin(finalIcons) {
      spinning = false;
      btnSpin.disabled = false;
      btnSpin.textContent = '🎰 GIRAR';

      // Stop spin sound
      soundSpin.pause();
      soundSpin.currentTime = 0;

      const allSame = finalIcons[0] === finalIcons[1] && finalIcons[1] === finalIcons[2];

      if (allSame) {
        // 🎉 WIN!
        const icon = ICONS[finalIcons[0]];
        soundWin.currentTime = 0;
        soundWin.play().catch(() => {});

        // Flash all reels
        reelBoxes.forEach(b => b.classList.add('win'));

        slotResult.className = 'slot-result win-show';
        slotResult.innerHTML = `
          🎉 ¡${icon.name} x3!
          <span class="multiplier">GANASTE x${icon.multiplier}</span>
        `;
      } else {
        // No mostrar nada al perder
        slotResult.className = 'slot-result';
        slotResult.innerHTML = '';
      }
    }
  </script>
</body>
</html>
