<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐷 Cerdos App</title>
  <script src="https://unpkg.com/@solana/web3.js@1.91.7/lib/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D0D0D;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 0 20px;
    }

    /* ── Fondo con grid neón sutil ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,45,149,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,45,149,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      max-width: 440px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* ── Card principal ── */
    .card {
      background: linear-gradient(145deg, #1A1A2E 0%, #16162A 100%);
      border-radius: 24px;
      padding: 40px 32px;
      border: 1px solid rgba(255,45,149,0.15);
      box-shadow:
        0 0 40px rgba(255,45,149,0.08),
        0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
    }

    /* ── Logo ── */
    .logo-img {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 12px;
      border: 2px solid rgba(255,45,149,0.3);
      box-shadow: 0 0 30px rgba(255,45,149,0.2);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #FF2D95;
      text-shadow: 0 0 20px rgba(255,45,149,0.4);
      margin-bottom: 4px;
    }

    .subtitle {
      color: #8888AA;
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* ── Botón conectar ── */
    .btn-connect {
      background: linear-gradient(135deg, #FF2D95 0%, #BF5FFF 100%);
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      box-shadow: 0 0 30px rgba(255,45,149,0.3);
    }

    .btn-connect:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(255,45,149,0.5);
    }

    .btn-connect:active {
      transform: translateY(0);
    }

    .btn-connect:disabled {
      background: #333;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── Resultados ── */
    .result {
      margin-top: 24px;
      padding: 24px 20px;
      border-radius: 16px;
      display: none;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result.success {
      background: rgba(57,255,20,0.06);
      border: 1px solid rgba(57,255,20,0.3);
      box-shadow: 0 0 30px rgba(57,255,20,0.1);
    }

    .result.fail {
      background: rgba(255,45,149,0.06);
      border: 1px solid rgba(255,45,149,0.25);
      box-shadow: 0 0 30px rgba(255,45,149,0.08);
    }

    .result.visible {
      display: block;
    }

    .result-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .success .result-title {
      color: #39FF14;
      text-shadow: 0 0 15px rgba(57,255,20,0.4);
    }

    .fail .result-title {
      color: #FF2D95;
      text-shadow: 0 0 15px rgba(255,45,149,0.3);
    }

    .wallet-info {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
      font-size: 13px;
      color: #999;
      word-break: break-all;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .wallet-info strong {
      display: block;
      color: #BF5FFF;
      margin-bottom: 4px;
    }

    .balance {
      font-size: 40px;
      font-weight: 900;
      color: #39FF14;
      text-shadow: 0 0 25px rgba(57,255,20,0.5);
      margin: 8px 0;
    }

    .balance-label {
      color: #39FF14;
      font-weight: 600;
      font-size: 14px;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,45,149,0.1);
      margin: 32px 0 24px;
    }

    /* ── Tragamonedas full-width ── */
    .slot-section {
      text-align: center;
      padding: 32px 16px;
    }

    .slot-section h3 {
      font-size: 16px;
      color: #BF5FFF;
      text-shadow: 0 0 10px rgba(191,95,255,0.3);
      margin-bottom: 16px;
    }

    .slot-img {
      width: 100%;
      max-width: 500px;
      height: auto;
      object-fit: contain;
      opacity: 0.9;
      filter: brightness(0.95);
    }

    .btn-disconnect {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: #888;
      padding: 8px 20px;
      border-radius: 12px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s;
    }

    .btn-disconnect:hover {
      border-color: #FF2D95;
      color: #FF2D95;
      box-shadow: 0 0 15px rgba(255,45,149,0.15);
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- Logo del grupo -->
      <img class="logo-img" src="logo-cerdos.jpg" alt="Cerdos Logo">

      <h1>Cerdos App</h1>
      <p class="subtitle">¿Eres un cerdo espectaculador?</p>

      <!-- Connect button -->
      <button id="btnConnect" class="btn-connect" onclick="connectWallet()">
        Conectar Wallet
      </button>

      <!-- Success result -->
      <div id="resultSuccess" class="result success">
        <div class="result-title">✨ ¡Eres un cerdo espectaculador!</div>
        <div class="balance" id="balanceDisplay">0</div>
        <div class="balance-label">CERDOS</div>
        <div class="wallet-info">
          <strong>🔑 Wallet</strong>
          <span id="walletDisplay">—</span>
        </div>
        <button class="btn-disconnect" onclick="disconnectWallet()">Desconectar</button>
      </div>

      <!-- Fail result -->
      <div id="resultFail" class="result fail">
        <div class="result-title">🐽 Todavía no eres un cerdo espectaculador</div>
        <p style="color:#888;font-size:14px;margin-bottom:12px;">
          No tenés tokens CERDOS en esta wallet.
        </p>
        <div class="wallet-info">
          <strong>🔑 Wallet</strong>
          <span id="walletDisplayFail">—</span>
        </div>
        <button class="btn-disconnect" onclick="disconnectWallet()">Desconectar</button>
      </div>

    </div>
  </div>

  <!-- Slot machine: full width -->
  <div class="slot-section">
    <h3>✨ Próximamente</h3>
    <img class="slot-img" src="slot-machine.jpg" alt="Ruleta Porcina">
  </div>

  <script>
    // ─────────────── Config ───────────────
    const CERDOS_MINT = 'CqJ5xawaraBqH5VPSQaCk7Dfei3aju3ry2UxfWkoGdKm';
    const RPC_URLS = [
      'https://api.mainnet-beta.solana.com',
      'https://solana-api.projectserum.com'
    ];
    let connection = null;
    let walletPublicKey = null;
    let currentProvider = null;

    // ─────────────── DOM refs ───────────────
    const btnConnect = document.getElementById('btnConnect');
    const resultSuccess = document.getElementById('resultSuccess');
    const resultFail = document.getElementById('resultFail');

    // ─────────────── Get provider ───────────────
    function getProvider() {
      if (typeof window !== 'undefined') {
        if (window.phantom?.solana?.isPhantom) return window.phantom.solana;
        if (window.solflare?.isSolflare) return window.solflare;
        if (window.solana?.isPhantom || window.solana?.isSolflare) return window.solana;
      }
      return null;
    }

    // ─────────────── Connect ───────────────
    async function connectWallet() {
      const provider = getProvider();

      if (!provider) {
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobile) {
          const currentUrl = encodeURIComponent(window.location.href);
          window.location.href = `https://phantom.app/ul/browse/${currentUrl}?ref=${currentUrl}`;
          return;
        }
        alert('No se detectó Phantom ni Solflare.\n\nDesktop: instalá Phantom desde phantom.app\nMobile: abrí esta página desde el navegador de Phantom.');
        return;
      }

      try {
        btnConnect.disabled = true;
        btnConnect.innerHTML = '<span class="loading"></span>Conectando...';

        const resp = await provider.connect();
        walletPublicKey = resp.publicKey.toString();
        currentProvider = provider;
        await verifyBalance();

      } catch (err) {
        console.error('Error conectando:', err);
        btnConnect.disabled = false;
        btnConnect.innerHTML = 'Conectar Wallet';
        if (err.code === 4001) return; // user rejected
        alert('Error al conectar: ' + err.message);
      }
    }

    // ─────────────── Verify balance ───────────────
    async function verifyBalance() {
      try {
        btnConnect.innerHTML = '<span class="loading"></span>Verificando cerdos...';

        const mintPubkey = new solanaWeb3.PublicKey(CERDOS_MINT);
        const ownerPubkey = new solanaWeb3.PublicKey(walletPublicKey);

        // Intentar cada RPC hasta que uno funcione
        let tokenAccounts = null;
        for (const url of RPC_URLS) {
          try {
            const conn = new solanaWeb3.Connection(url, 'confirmed');
            tokenAccounts = await conn.getParsedTokenAccountsByOwner(ownerPubkey, { mint: mintPubkey });
            connection = conn;
            break;
          } catch(e) { continue; }
        }
        if (!tokenAccounts) throw new Error('No se pudo conectar a ningún RPC');

        let balance = 0;
        for (const acc of tokenAccounts.value) {
          balance += acc.account.data.parsed.info.tokenAmount.uiAmount || 0;
        }

        btnConnect.style.display = 'none';

        if (balance > 0) {
          resultSuccess.classList.add('visible');
          resultFail.classList.remove('visible');
          document.getElementById('balanceDisplay').textContent =
            balance % 1 === 0 ? balance.toLocaleString() : balance.toFixed(2);
          document.getElementById('walletDisplay').textContent = walletPublicKey;
        } else {
          resultSuccess.classList.remove('visible');
          resultFail.classList.add('visible');
          document.getElementById('walletDisplayFail').textContent = walletPublicKey;
        }

      } catch (err) {
        console.error('Error verificando balance:', err);
        // Mostrar estado de error manteniendo wallet conectada
        btnConnect.style.display = 'none';
        resultSuccess.classList.remove('visible');
        resultFail.classList.add('visible');
        document.getElementById('walletDisplayFail').textContent = walletPublicKey;
        // Cambiar mensaje de fail para indicar error de conexión
        const failTitle = resultFail.querySelector('.result-title');
        const failMsg = resultFail.querySelector('p');
        failTitle.textContent = '⚠️ Error de conexión';
        failMsg.textContent = 'No se pudo verificar el balance. Reintentá.';
        // Agregar botón de reintentar
        let retryBtn = document.getElementById('retryBtn');
        if (!retryBtn) {
          retryBtn = document.createElement('button');
          retryBtn.id = 'retryBtn';
          retryBtn.className = 'btn-connect';
          retryBtn.textContent = 'Reintentar verificación';
          retryBtn.style.cssText = 'margin-top:12px;padding:12px 24px;font-size:14px;';
          retryBtn.onclick = verifyBalance;
          resultFail.appendChild(retryBtn);
        }
        retryBtn.style.display = 'block';
      }
    }

    // ─────────────── Disconnect ───────────────
    async function disconnectWallet() {
      if (currentProvider) {
        try { await currentProvider.disconnect(); } catch(e) {}
        currentProvider = null;
      }
      walletPublicKey = null;
      connection = null;
      resetUI();
    }

    function resetUI() {
      btnConnect.style.display = 'block';
      btnConnect.disabled = false;
      btnConnect.innerHTML = 'Conectar Wallet';
      resultSuccess.classList.remove('visible');
      resultFail.classList.remove('visible');
      // Resetear mensaje de fail
      const failTitle = resultFail.querySelector('.result-title');
      const failMsg = resultFail.querySelector('p');
      if (failTitle) failTitle.textContent = '🐽 Todavía no eres un cerdo espectaculador';
      if (failMsg) failMsg.textContent = 'No tenés tokens CERDOS en esta wallet.';
      const retryBtn = document.getElementById('retryBtn');
      if (retryBtn) retryBtn.style.display = 'none';
    }

    // ─────────────── Auto-connect on load ───────────────
    window.addEventListener('load', () => {
      const provider = getProvider();
      if (provider) {
        provider.on('accountChanged', () => {
          if (walletPublicKey) disconnectWallet();
        });
      }
    });
  </script>
</body>
</html>
